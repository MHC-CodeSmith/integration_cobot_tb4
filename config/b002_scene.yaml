# Visual semantic layer for B002.
#
# The occupancy map already contains the physical things seen by the TurtleBot4
# LiDAR. Keep those as the source of truth. These objects are only lightweight
# visual hints for humans in RViz.
#
# mode:
#   rich    -> detailed scene with factory, desks, chairs, boards, PC area.
#   minimal -> only the objects listed below in objects:.
# To remove all semantic objects: set enabled: false.

lidar_obstacle_height_m: 0.20

semantic_overlay:
  enabled: true
  mode: rich

  # Used only when mode: minimal.
  objects:
    - id: factory_zone
      enabled: true
      type: box
      xyz: [0.00, 2.15, 0.012]
      rpy: [0.0, 0.0, 0.0]
      size: [1.00, 2.00, 0.018]
      color: [0.05, 0.70, 0.24, 0.22]

    - id: dock_zone
      enabled: false
      type: cylinder
      xyz: [-0.1148907467, -0.2112344652, 0.030]
      rpy: [0.0, 0.0, 0.0]
      radius: 0.34
      length: 0.025
      color: [0.45, 0.08, 0.90, 0.40]

    - id: pc_chairs_back_table_zone
      enabled: true
      type: box
      xyz: [0.00, 6.78, 0.012]
      rpy: [0.0, 0.0, 0.0]
      size: [2.00, 0.62, 0.018]
      color: [1.00, 0.55, 0.05, 0.20]

    - id: pc_chairs_wall_table_zone
      enabled: true
      type: box
      xyz: [0.55, 5.62, 0.012]
      rpy: [0.0, 0.0, 0.0]
      size: [0.62, 1.80, 0.018]
      color: [1.00, 0.55, 0.05, 0.20]

    - id: tables_boards_lower_zone
      enabled: true
      type: box
      xyz: [-4.45, 1.20, 0.012]
      rpy: [0.0, 0.0, 0.0]
      size: [1.30, 0.95, 0.018]
      color: [0.95, 0.05, 0.70, 0.20]

    - id: tables_boards_upper_zone
      enabled: true
      type: box
      xyz: [-4.45, 5.35, 0.012]
      rpy: [0.0, 0.0, 0.0]
      size: [1.55, 1.25, 0.018]
      color: [0.95, 0.05, 0.70, 0.20]

    - id: mycobot_anchor_marker
      enabled: true
      type: cylinder
      xyz: [-0.338416188955307, 1.1060110330581665, 0.12]
      rpy: [0.0, 0.0, 0.0]
      radius: 0.09
      length: 0.24
      color: [0.10, 0.70, 1.00, 0.70]

    # Examples kept disabled on purpose. Enable only when the object is not
    # already clear from the occupied cells of the LiDAR map.
    - id: factory_low_hint
      enabled: false
      type: box
      xyz: [0.00, 2.15, 0.24]
      rpy: [0.0, 0.0, 0.0]
      size: [0.80, 1.80, 0.48]
      color: [0.72, 0.73, 0.72, 0.55]

    - id: movable_whiteboard_hint
      enabled: false
      type: box
      xyz: [-4.70, 2.30, 0.75]
      rpy: [0.0, 0.0, 0.0]
      size: [0.05, 1.20, 1.50]
      color: [0.96, 0.96, 0.94, 0.70]
